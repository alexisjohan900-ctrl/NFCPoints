workflows:
  ios-workflow:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Build
        script: |
          xcodebuild archive \
            -project NFCPoints.xcodeproj \
            -scheme NFCPoints \
            -archivePath build/NFCPoints.xcarchive \
            -allowProvisioningUpdates
    
    artifacts:
      - build/Build/Products/Release-iphoneos/*.app
  