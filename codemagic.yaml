workflows:
  ios-workflow:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Build
        script: |
          xcodebuild build \
            -project NFCPoints/NFCPoints.xcodeproj \
            -scheme NFCPoints \
            -configuration Release \
            -derivedDataPath build \
            -destination generic/platform=iOS
    
    artifacts:
      - build/Build/Products/Release-iphoneos/*.app
  